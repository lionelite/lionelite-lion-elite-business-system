<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lion Elite Intelligence</title>
  <style>
    :root { color-scheme: dark; --gold:#d8b45c; --panel:#111; --muted:#9ca3af; --danger:#8b2d2d; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:Arial,sans-serif; background:#050505; color:#fff; }
    header { padding:24px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center; }
    h1,h2 { margin:0; }
    .gold { color:var(--gold); }
    .muted { color:var(--muted); }
    main { padding:24px; max-width:1500px; margin:auto; }
    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:22px; }
    .card,.panel { background:var(--panel); border:1px solid #222; border-radius:14px; padding:18px; }
    .label { color:var(--muted); font-size:12px; text-transform:uppercase; }
    .value { font-size:30px; font-weight:700; margin-top:8px; }
    .toolbar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
    input,select,textarea,button,a.button { background:#111; color:#fff; border:1px solid #333; border-radius:10px; padding:10px 12px; text-decoration:none; }
    textarea { width:100%; min-height:100px; resize:vertical; }
    button,a.button { cursor:pointer; }
    button.primary,a.primary { background:var(--gold); color:#111; border-color:var(--gold); font-weight:700; }
    button.danger { background:var(--danger); border-color:var(--danger); }
    .table-wrap { overflow:auto; border:1px solid #222; border-radius:14px; }
    table { width:100%; border-collapse:collapse; min-width:1250px; background:#0d0d0d; }
    th,td { padding:12px; border-bottom:1px solid #222; text-align:left; font-size:13px; vertical-align:top; }
    th { color:var(--gold); position:sticky; top:0; background:#111; }
    .score { font-weight:700; color:var(--gold); }
    .status { text-transform:capitalize; }
    .actions { display:flex; gap:6px; flex-wrap:wrap; }
    .actions button,.actions a { padding:7px 9px; font-size:12px; }
    dialog { width:min(680px,94vw); border:1px solid #333; border-radius:16px; background:#0c0c0c; color:#fff; padding:0; }
    dialog::backdrop { background:rgba(0,0,0,.78); }
    .modal-head,.modal-body,.modal-foot { padding:18px; }
    .modal-head { display:flex; justify-content:space-between; border-bottom:1px solid #222; }
    .modal-foot { display:flex; justify-content:flex-end; gap:10px; border-top:1px solid #222; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .form-grid .full { grid-column:1/-1; }
    .form-grid label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; }
    .form-grid input,.form-grid select { width:100%; }
    .notice { margin:12px 0; padding:12px; border:1px solid #333; border-radius:10px; display:none; }
    .notice.show { display:block; }
  </style>
</head>
<body>
<header>
  <h1><span class="gold">Lion Elite</span> Intelligence</h1>
  <span class="muted">Sales Rep Workspace</span>
</header>
<main>
  <section class="cards">
    <div class="card"><div class="label">Total Leads</div><div class="value" id="total">0</div></div>
    <div class="card"><div class="label">Qualified 80+</div><div class="value" id="qualified">0</div></div>
    <div class="card"><div class="label">New</div><div class="value" id="newLeads">0</div></div>
    <div class="card"><div class="label">Do Not Contact</div><div class="value" id="dnc">0</div></div>
  </section>

  <section class="toolbar">
    <input id="query" placeholder="Search company, owner, city..." />
    <input id="state" placeholder="State, e.g. FL" maxlength="2" />
    <input id="minScore" type="number" min="0" max="100" value="60" />
    <select id="status">
      <option value="">All statuses</option>
      <option value="new">New</option>
      <option value="contacted">Contacted</option>
      <option value="follow_up">Follow Up</option>
      <option value="qualified">Qualified</option>
      <option value="meeting_booked">Meeting Booked</option>
      <option value="closed">Closed</option>
    </select>
    <button class="primary" onclick="refreshAll()">Refresh</button>
    <a class="button" id="exportLink" href="/exports/leads.csv?min_score=60">Export Leads</a>
    <a class="button" href="/sales/call-queue.csv?min_score=70">Export Call Queue</a>
  </section>

  <div id="notice" class="notice"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Score</th><th>Company</th><th>Owner</th><th>Type</th><th>Location</th>
          <th>Phone</th><th>Email</th><th>Angle</th><th>Status</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</main>

<dialog id="activityDialog">
  <div class="modal-head"><h2>Log Activity</h2><button onclick="activityDialog.close()">✕</button></div>
  <form id="activityForm">
    <div class="modal-body">
      <input type="hidden" id="activityLeadId" />
      <div class="form-grid">
        <div><label>Activity Type</label><select id="activityType"><option>call</option><option>email</option><option>text</option><option>meeting</option><option>note</option></select></div>
        <div><label>Outcome</label><input id="activityOutcome" placeholder="interested, no answer, booked..." /></div>
        <div><label>New Lead Status</label><select id="activityStatus"><option value="">No change</option><option value="contacted">Contacted</option><option value="follow_up">Follow Up</option><option value="qualified">Qualified</option><option value="meeting_booked">Meeting Booked</option><option value="closed">Closed</option></select></div>
        <div><label>Next Follow-Up</label><input id="activityFollowUp" type="datetime-local" /></div>
        <div class="full"><label>Notes</label><textarea id="activityNotes" placeholder="What happened on the call?"></textarea></div>
      </div>
    </div>
    <div class="modal-foot"><button type="button" onclick="activityDialog.close()">Cancel</button><button class="primary" type="submit">Save Activity</button></div>
  </form>
</dialog>

<dialog id="emailDialog">
  <div class="modal-head"><h2>Outreach Preview</h2><button onclick="emailDialog.close()">✕</button></div>
  <div class="modal-body">
    <div class="form-grid">
      <div class="full"><label>To</label><input id="emailTo" readonly /></div>
      <div class="full"><label>Subject</label><input id="emailSubject" readonly /></div>
      <div class="full"><label>Body</label><textarea id="emailBody" style="min-height:340px" readonly></textarea></div>
    </div>
  </div>
  <div class="modal-foot"><button onclick="copyEmail()">Copy Email</button><button class="primary" onclick="openMailto()">Open in Email</button></div>
</dialog>

<script>
let currentEmail = null;
const activityDialog = document.getElementById('activityDialog');
const emailDialog = document.getElementById('emailDialog');

async function refreshAll(){ await Promise.all([loadStats(),loadLeads()]); }
async function loadStats(){ const r=await fetch('/stats'); const s=await r.json(); total.textContent=s.total_leads; qualified.textContent=s.qualified_leads; newLeads.textContent=s.new_leads; dnc.textContent=s.do_not_contact; }

async function loadLeads(){
  const q=query.value, st=state.value.toUpperCase(), min=minScore.value||0, stat=status.value;
  const p=new URLSearchParams({min_score:min,limit:500});
  if(q)p.set('q',q); if(st)p.set('state',st); if(stat)p.set('status',stat);
  exportLink.href=`/exports/leads.csv?min_score=${min}${stat?`&status=${stat}`:''}`;
  const r=await fetch(`/leads?${p}`), leads=await r.json();
  rows.innerHTML=leads.map(l=>`<tr>
    <td class="score">${l.score}</td><td>${esc(l.company_name)}</td><td>${esc(l.owner_name||'')}</td><td>${esc(l.category)}</td>
    <td>${esc([l.city,l.state].filter(Boolean).join(', '))}</td>
    <td>${l.public_phone?`<a href="tel:${esc(l.public_phone)}">${esc(l.public_phone)}</a>`:''}</td>
    <td>${l.public_email?`<a href="mailto:${esc(l.public_email)}">${esc(l.public_email)}</a>`:''}</td>
    <td>${esc(l.partnership_angle||'')}</td><td class="status">${esc(l.status)}</td>
    <td><div class="actions">
      ${l.public_phone?`<a class="button" href="tel:${esc(l.public_phone)}">Call</a>`:''}
      <button onclick="openActivity(${l.id})">Log</button>
      ${l.public_email?`<button onclick="previewEmail(${l.id})">Email</button>`:''}
      <button class="danger" onclick="markDnc(${l.id})">DNC</button>
    </div></td></tr>`).join('');
}

function openActivity(id){ activityLeadId.value=id; activityForm.reset(); activityLeadId.value=id; activityDialog.showModal(); }
activityForm.addEventListener('submit',async e=>{
  e.preventDefault();
  const payload={activity_type:activityType.value,outcome:activityOutcome.value||null,notes:activityNotes.value||null,next_follow_up_at:activityFollowUp.value?new Date(activityFollowUp.value).toISOString():null,new_lead_status:activityStatus.value||null};
  const r=await fetch(`/activities/leads/${activityLeadId.value}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  if(!r.ok)return showNotice((await r.json()).detail||'Unable to save activity',true);
  activityDialog.close(); showNotice('Activity saved.'); refreshAll();
});

async function previewEmail(id){
  const r=await fetch(`/sales/leads/${id}/outreach-preview`); const data=await r.json();
  if(!r.ok)return showNotice(data.detail||'Unable to generate email',true);
  currentEmail=data; emailTo.value=data.to; emailSubject.value=data.subject; emailBody.value=data.body; emailDialog.showModal();
}
function copyEmail(){ navigator.clipboard.writeText(`To: ${currentEmail.to}\nSubject: ${currentEmail.subject}\n\n${currentEmail.body}`); showNotice('Email copied.'); }
function openMailto(){ location.href=`mailto:${encodeURIComponent(currentEmail.to)}?subject=${encodeURIComponent(currentEmail.subject)}&body=${encodeURIComponent(currentEmail.body)}`; }

async function markDnc(id){
  if(!confirm('Mark this lead as Do Not Contact?'))return;
  const r=await fetch(`/leads/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({do_not_contact:true,status:'do_not_contact'})});
  if(!r.ok)return showNotice('Unable to update lead.',true);
  showNotice('Lead marked Do Not Contact.'); refreshAll();
}
function showNotice(msg,error=false){ notice.textContent=msg; notice.style.borderColor=error?'#8b2d2d':'#3f6d3f'; notice.classList.add('show'); setTimeout(()=>notice.classList.remove('show'),3500); }
function esc(v){ return String(v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
refreshAll();
</script>
</body>
</html>
